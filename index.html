<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏化学习小组 | Gamified Learning Group</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
    }
    .welcome-banner {
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff6b6b);
      background-size: 300% 100%;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 1.5em;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      animation: shimmer 3s linear infinite;
      border-bottom: 4px solid #fff;
    }
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 300% center; }
    }
    .welcome-banner .teacher-name {
      font-size: 1.3em;
      color: #fff9c4;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
      padding: 0 10px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .hero { text-align: center; padding: 60px 20px; color: white; }
    .hero h1 { font-size: 3em; margin-bottom: 20px; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); }
    .hero p { font-size: 1.3em; opacity: 0.95; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
    .card { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); transition: transform 0.3s; }
    .card:hover { transform: translateY(-8px); }
    .card h2 { color: #667eea; margin-bottom: 15px; }
    .card a { display: inline-block; margin-top: 15px; padding: 10px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-decoration: none; border-radius: 24px; }
    footer { text-align: center; padding: 40px; color: rgba(255,255,255,0.8); margin-top: 60px; }
    @media (max-width: 768px) { .hero h1 { font-size: 2em; } .welcome-banner { font-size: 1.1em; } }
  </style>
</head>
<body>
  <div class="welcome-banner">
    🎉 热烈欢迎 <span class="teacher-name">王依民老师</span> 莅临指导！🎉
  </div>
  <div class="hero">
    <h1>🎮 游戏化学习小组</h1>
    <p>28天系统化培训，从0到1建立个人品牌和技术栈</p>
  </div>
  <div class="container">
    <div class="cards">
      <div class="card">
        <h2>📅 课程安排</h2>
        <p>查看完整的28天学习计划，包括每日任务和打卡要求。</p>
        <a href="SCHEDULE.md">查看课表</a>
      </div>
      <div class="card">
        <h2>📝 游戏规则</h2>
        <p>了解积分系统、等级制度和奖励机制，让学习更有趣！</p>
        <a href="docs/rules.md">查看规则</a>
      </div>
      <div class="card">
        <h2>🚀 快速开始</h2>
        <p>新手指南，帮助你快速加入并开始学习之旅。</p>
        <a href="docs/onboarding.md">开始上手</a>
      </div>
    </div>
  </div>
  <footer>
    <p>🦞 由 OpenClaw AI 协助构建 | 2026</p>
  </footer>
</body>
</html>
