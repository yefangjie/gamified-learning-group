<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏化学习小组</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            text-align: center;
        }
        .banner {
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
        }
        .teacher { color: #fff9c4; }
        .container { padding: 50px 20px; }
        h1 { font-size: 3em; margin: 30px 0; }
        p { font-size: 1.2em; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 30px;
            margin: 10px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="banner">
        🎉 热烈欢迎 <span class="teacher">王依民老师</span> 莅临指导！🎉
    </div>
    <div class="container">
        <h1>🎮 游戏化学习小组</h1>
        <p>28天系统化培训，从0到1建立个人品牌和技术栈</p>
        <a href="SCHEDULE.md" class="btn">📅 查看课程表</a>
        <a href="docs/rules.md" class="btn">📝 游戏规则</a>
    </div>
</body>
</html>
