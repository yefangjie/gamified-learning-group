<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="游戏化学习小组 - 28天系统化培训，从0到1建立个人品牌和技术栈">
  <title>游戏化学习小组 | Gamified Learning Group</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 🎉 动态欢迎 Banner -->
  <div class="welcome-banner" id="welcomeBanner">
    <span class="weekday" id="weekdayText"></span>
    <span id="welcomeText">加载中...</span>
  </div>

  <!-- Hero 区域 -->
  <header class="hero">
    <h1>🎮 游戏化学习小组</h1>
    <p>28天系统化培训，从0到1建立个人品牌和技术栈</p>
  </header>

  <!-- 主内容区 -->
  <main class="container">
    <div class="cards">
      <article class="card">
        <h2>📅 课程安排</h2>
        <p>查看完整的28天学习计划，包括每日任务和打卡要求。系统化的学习路径，帮助你循序渐进地掌握技能。</p>
        <a href="SCHEDULE.md">查看课表</a>
      </article>
      
      <article class="card">
        <h2>📝 游戏规则</h2>
        <p>了解积分系统、等级制度和奖励机制，让学习更有趣！完成任务获得积分，解锁成就，与同伴一起成长。</p>
        <a href="docs/rules.md">查看规则</a>
      </article>
      
      <article class="card">
        <h2>🚀 快速开始</h2>
        <p>新手指南，帮助你快速加入并开始学习之旅。包含环境配置、工具推荐和常见问题解答。</p>
        <a href="docs/onboarding.md">开始上手</a>
      </article>
    </div>
  </main>

  <!-- 页脚 -->
  <footer>
    <p>🦞 由 OpenClaw AI 协助构建 | 2026</p>
  </footer>

  <script>
    // ========================================
    // 动态欢迎语配置
    // ========================================
    const welcomeConfig = {
      1: { text: "🎉 热烈欢迎", teacher: "王依民老师", emoji: "👨🏫" },      // 周一
      2: { text: "🎉 热烈欢迎", teacher: "李康南老师", emoji: "👩🏫" },      // 周二
      3: { text: "🎉 热烈欢迎", teacher: "张志恒老师", emoji: "👨💼" },      // 周三
      4: { text: "🎉 热烈欢迎", teacher: "叶芳杰老师", emoji: "👩💼" },      // 周四
      5: { text: "🎉 热烈欢迎", teacher: "王升锋老师", emoji: "👨🎓" },      // 周五
      6: { text: "🌿 周末愉快！", teacher: "大家休息一下", emoji: "☕" },   // 周六
      0: { text: "🌿 周末愉快！", teacher: "大家休息一下", emoji: "☕" }    // 周日
    };
    
    const weekdayNames = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
    
    function updateWelcomeBanner() {
      const now = new Date();
      const dayOfWeek = now.getDay();
      const config = welcomeConfig[dayOfWeek];
      const banner = document.getElementById('welcomeBanner');
      const weekdayText = document.getElementById('weekdayText');
      const welcomeText = document.getElementById('welcomeText');
      
      // 更新星期显示
      weekdayText.textContent = weekdayNames[dayOfWeek];
      
      // 更新欢迎语
      if (dayOfWeek === 0 || dayOfWeek === 6) {
        // 周末
        banner.classList.add('weekend');
        welcomeText.innerHTML = `${config.emoji} ${config.text} ${config.teacher} ${config.emoji}`;
      } else {
        // 工作日
        banner.classList.remove('weekend');
        welcomeText.innerHTML = `${config.emoji} ${config.text} <span class="teacher-name">${config.teacher}</span> 莅临指导！${config.emoji}`;
      }
    }
    
    // 页面加载时更新
    updateWelcomeBanner();
    
    // 每分钟检查一次（跨天时自动更新）
    setInterval(updateWelcomeBanner, 60000);
  </script>
</body>
</html>
